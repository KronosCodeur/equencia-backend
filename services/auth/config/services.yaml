services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/Domain/Entity/'
            - '../src/Domain/Entity/Enum/'
            - '../src/Kernel.php'

    App\Domain\Repository\UserRepositoryInterface:
        class: App\Infrastructure\Persistence\DoctrineUserRepository

    App\Domain\Repository\TenantRepositoryInterface:
        class: App\Infrastructure\Persistence\DoctrineTenantRepository

    App\Infrastructure\Security\TenantContext:
        public: true
