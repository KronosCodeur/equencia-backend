# ─────────────────────────────────────────────────────────────
#  Equencia — Nginx Reverse Proxy (LOCAL uniquement)
#  Production : Traefik (infrastructure/traefik/)
#
#  Routing :
#    /api/auth/**          → auth:8001
#    /api/tenants/**       → auth:8001
#    /api/employees/**     → rh:8002
#    /api/attendance/**    → rh:8002
#    /api/planning/**      → rh:8002
#    /api/leaves/**        → rh:8002
#    /api/payroll/**       → rh:8002
#    /api/departments/**   → rh:8002
#    /api/sites/**         → rh:8002
#    /api/inspections/**   → ops:8003
#    /api/documents/**     → ops:8003
#    /api/notifications/** → ops:8003
# ─────────────────────────────────────────────────────────────

upstream auth_service {
    server auth:8001;
}

upstream rh_service {
    server rh:8002;
}

upstream ops_service {
    server ops:8003;
}

server {
    listen 80;
    server_name localhost api.equencia.local;

    client_max_body_size 50M;

    # ── Auth Service ─────────────────────────────────────────
    location ~ ^/api/(auth|tenants) {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── RH Service ───────────────────────────────────────────
    location ~ ^/api/(employees|attendance|planning|leaves|payroll|departments|sites|shifts) {
        proxy_pass http://rh_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Ops Service ──────────────────────────────────────────
    location ~ ^/api/(inspections|documents|notifications) {
        proxy_pass http://ops_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Health check global ──────────────────────────────────
    location /health {
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }

    # ── 404 par défaut ───────────────────────────────────────
    location / {
        return 404 '{"error":"Route not found"}';
        add_header Content-Type application/json;
    }
}
