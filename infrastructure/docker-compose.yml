# ─────────────────────────────────────────────────────────────
#  Equencia Backend — Docker Compose LOCAL
#  Reverse proxy : Nginx (local) | Traefik en production
#  Démarrer : make dev
# ─────────────────────────────────────────────────────────────

services:

  # ── Reverse Proxy Local ─────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: equencia_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth
      - rh
      - ops
    networks:
      - equencia
    restart: unless-stopped

  # ── Auth Service ────────────────────────────────────────────
  auth:
    build:
      context: ../services/auth
      dockerfile: Dockerfile
      target: dev
    container_name: equencia_auth
    env_file:
      - ../.env
    environment:
      APP_ENV: dev
      SERVICE_NAME: auth
      SERVER_PORT: 8001
    ports:
      - "8001:8001"
    volumes:
      - ../services/auth:/app
      - auth_vendor:/app/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - equencia
    restart: unless-stopped

  # ── RH Service ──────────────────────────────────────────────
  rh:
    build:
      context: ../services/rh
      dockerfile: Dockerfile
      target: dev
    container_name: equencia_rh
    env_file:
      - ../.env
    environment:
      APP_ENV: dev
      SERVICE_NAME: rh
      SERVER_PORT: 8002
    ports:
      - "8002:8002"
    volumes:
      - ../services/rh:/app
      - rh_vendor:/app/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - equencia
    restart: unless-stopped

  # ── Ops Service ─────────────────────────────────────────────
  ops:
    build:
      context: ../services/ops
      dockerfile: Dockerfile
      target: dev
    container_name: equencia_ops
    env_file:
      - ../.env
    environment:
      APP_ENV: dev
      SERVICE_NAME: ops
      SERVER_PORT: 8003
    ports:
      - "8003:8003"
    volumes:
      - ../services/ops:/app
      - ops_vendor:/app/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mercure:
        condition: service_started
      gotenberg:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - equencia
    restart: unless-stopped

  # ── Messenger Workers ────────────────────────────────────────
  worker-rh:
    build:
      context: ../services/rh
      dockerfile: Dockerfile
      target: dev
    container_name: equencia_worker_rh
    command: php bin/console messenger:consume async --time-limit=3600 --memory-limit=128M
    env_file:
      - ../.env
    environment:
      APP_ENV: dev
      SERVICE_NAME: rh
    volumes:
      - ../services/rh:/app
      - rh_vendor:/app/vendor
    depends_on:
      - rh
      - redis
    networks:
      - equencia
    restart: unless-stopped

  worker-ops:
    build:
      context: ../services/ops
      dockerfile: Dockerfile
      target: dev
    container_name: equencia_worker_ops
    command: php bin/console messenger:consume async --time-limit=3600 --memory-limit=128M
    env_file:
      - ../.env
    environment:
      APP_ENV: dev
      SERVICE_NAME: ops
    volumes:
      - ../services/ops:/app
      - ops_vendor:/app/vendor
    depends_on:
      - ops
      - redis
    networks:
      - equencia
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: equencia_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-equencia}
      POSTGRES_USER: ${POSTGRES_USER:-equencia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-equencia_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-equencia}", "-d", "${POSTGRES_DB:-equencia}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - equencia
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: equencia_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --save 60 1
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - equencia
    restart: unless-stopped

  # ── Mercure (SSE) ────────────────────────────────────────────
  mercure:
    image: dunglas/mercure
    container_name: equencia_mercure
    environment:
      SERVER_NAME: ":3001"
      MERCURE_PUBLISHER_JWT_KEY: ${MERCURE_JWT_SECRET:-mercure_dev_secret}
      MERCURE_SUBSCRIBER_JWT_KEY: ${MERCURE_JWT_SECRET:-mercure_dev_secret}
      MERCURE_EXTRA_DIRECTIVES: |
        cors_origins *
        anonymous
    ports:
      - "3001:3001"
    networks:
      - equencia
    restart: unless-stopped

  # ── MinIO (Object Storage S3) ────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: equencia_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio_secret_key}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - equencia
    restart: unless-stopped

  # ── Gotenberg (PDF) ──────────────────────────────────────────
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: equencia_gotenberg
    command:
      - gotenberg
      - --chromium-disable-javascript=true
      - --chromium-allow-list=file:///tmp/.*
    ports:
      - "3002:3000"
    networks:
      - equencia
    restart: unless-stopped

  # ── MailHog (Email dev) ──────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: equencia_mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - equencia

# ── Volumes ──────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:
  auth_vendor:
  rh_vendor:
  ops_vendor:

# ── Network ──────────────────────────────────────────────────
networks:
  equencia:
    driver: bridge
